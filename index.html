<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="{{ "assets/main.css" | relative_url }}">
        <title>
            Welcome Garden Produce Weight Calculator
        </title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/9.3.2/math.js"></script> 
        <script>
            class ProduceWeight {
                //class to manage an object representing the current table of produce weights and helper methods for table transormations
                _weights;//array of weights, unmerged; parallel to varieties
                _varieties;//array of varieties, unmerged; parralel to weights
                _merge_matrix;//SparseMatrix to store which entries in varieties should be merged to produce the merged weight list.
                _merged_varieties;//array of variety names after merging
                n_shares;//how many csa shares total
                n_coop_shares;//how many shares diverted to co-op

                constructor(n_shares , n_coop_shares , weights = [] , varieties = [] , merge_matrix = math.matrix([[1]],'sparse') , merged_varieties = []) {
                    this._weights = weights;
                    this._varieties = varieties;
                    this._merge_matrix = merge_matrix;
                    this._merged_varieties = merged_varieties;
                    this.n_shares = n_shares;
                    this.n_coop_shares = n_coop_shares;
                }
                
                //log a new box that you just weighed
                add_entry(veg , mass) {
                    if(this._varieties.indexOf(veg) >= 0) {//we already have a row
                        this._weights[this._varieties.indexOf(veg)] += mass;
                    } else {//append a new rows
                        this._varieties.push(veg);
                        this._weights.push(mass);
                        if(this._merged_varieties.length > 0) {
                            this._merge_matrix.set([this._merge_matrix.size()[0] , this._merge_matrix.size()[1]] , 1);
                        }
                        this._merged_varieties.push(veg);
                    }
                }

                //compute how much one share should be
                #calc_one_share() {
                    return this._merged_weights().map((w) => (w / this.n_shares).toFixed(1));
                }

                //compute total weight to give to co-op
                #calc_coop_weights() {
                    return this.#calc_one_share().map(o => (o * this.n_coop_shares).toFixed(1));
                }

                //update the merge matrix to merge two or more rows (string names of varieties) together
                merge(rows) {
                    //identify the index of all rows to merge, sum those rows, and append a new merge matrix of the
                    //unaffected rows plus this new merged row at the bottom
                    const row_indices = rows.map((r) => this._varieties.indexOf(r));
                    const to_merge = row_indices.map(
                        (r => math.row(
                            this._merge_matrix , r)));
                    const merged_row = math.sum(to_merge);
                    const preserved_indices = Array.from({ length: this._weights.length }, (_, i) => i).filter(i => !row_indices.includes(i));
                    const preserved = math.matrix(
                        math.concat(
                            preserved_indices.map(
                                (r) => math.squeeze(
                                    math.row(this._merge_matrix , r).valueOf()))));
                    this._merge_matrix = math.matrix(math.concat(preserved , merged_row , 0),'sparse');
                    //make an array parallel to the zeroth dimension of the merge matrix with merged row names
                    const preserved_varieties = preserved_indices.map(
                        i => this._varieties[i]
                    ).valueOf();
                    const merged_variety = row_indices.map(
                        i => this._merged_varieties[i]).reduce(
                            (accumulator , currentValue) => accumulator + ' or ' + currentValue);
                    this._merged_varieties = preserved_varieties;
                    this._merged_varieties.push(merged_variety);
                }
s
                //matrix transform the unmerged weight table into the merged weight table
                _merged_weights() {
                    return math.flatten(
                        math.matrix(
                            math.multiply(
                                this._merge_matrix ,
                                math.matrix(this._weights)
                            ) ,
                            'dense'
                        )
                    ).valueOf();
                }

                //calculate and return one share's amounts as a json of {variety:weight}
                get one_share() {
                    return this._json_zip(this._merged_varieties , this.#calc_one_share());
                }

                //private function to zip two parallel arrays into a json of {arr1:arr2}
                _json_zip(arr1 , arr2) {
                    return arr1.reduce((obj , a1 , i) => {
                        obj[a1] = arr2[i];
                        return obj;
                    },{});
                }

                //return a JSON object of {variety:weight}. by default, this will be merged
                get weights() {
                    return this._json_zip(this._merged_varieties , this._merged_weights());
                }

                //return a JSON object of {variety:weight} but always the unmerged
                get_unmerged_weights() {
                    return this._json_zip(this._varieties , this._weights);
                }

                //calculate and return the co-op's ammount as a json of {variety:weight}
                get coop_weights() {
                    return this._json_zip(this._merged_varieties , this.#calc_coop_weights());
                }

                //serialize into JSON without adding in unhelpful math.js objects
                //this also stores date iff the field is present for export purposes
                toJSON() {
                    if(this.date) {
                        const d_str = this.date.getFullYear() + '/' +  (this.date.getMonth() + 1) + '/' + this.date.getDate();
                        return {
                            '_weights': this._weights ,
                            '_varieties' : this._varieties ,
                            '_merge_matrix' : this._merge_matrix.valueOf() ,
                            '_merged_varieties' : this._merged_varieties ,
                            'n_shares' : this.n_shares ,
                            'n_coop_shares' : this.n_coop_shares ,
                            'date' : d_str
                        }
                    } else {
                        return {
                            '_weights': this._weights ,
                            '_varieties' : this._varieties ,
                            '_merge_matrix' : this._merge_matrix.valueOf() ,
                            '_merged_varieties' : this._merged_varieties ,
                            'n_shares' : this.n_shares ,
                            'n_coop_shares' : this.n_coop_shares ,
                        }
                    }
                    
                }
            }

            //initialize a ProduceWeight instance and reveal the weight entry form
            function launch() {
                local_store_object(
                    'pw' ,
                    new ProduceWeight(document.getElementById('n_shares').value ,
                                    document.getElementById('n_coop_shares').value)
                );
                document.getElementById('additem').style.display='block';
                document.getElementById('toggles').style.display='block';
                document.getElementById('n_shares').value = document.getElementById('n_shares').value + ' total shares';
                document.getElementById('n_coop_shares').value = document.getElementById('n_coop_shares').value + ' reserved for co-op';
                document.getElementById('n_shares').disabled = true;
                document.getElementById('n_coop_shares').disabled = true;
                document.getElementById('launch_button').style.display = 'none';
            }

            //stringify and local-storage a JSON object
            function local_store_object(name , object){
                localStorage.setItem(name , JSON.stringify(object));
            }

            //load from local storage and parse a stringified JSON object
            function local_get_object(name) {
                let obj = JSON.parse(localStorage.getItem(name));

                return new ProduceWeight(parseFloat(obj.n_shares) ,
                    parseFloat(obj.n_coop_shares) ,
                    obj._weights ,
                    obj._varieties ,
                    math.matrix(obj._merge_matrix , 'sparse') ,
                    obj._merged_varieties ,
                    );
            }

            //collect a user's entry from the produce weight form; append to the ProduceWeight in local storage, and clear form
            function add() {
                let my_pw = local_get_object('pw');
                my_pw.add_entry(document.getElementById("veg").value , parseFloat(document.getElementById("mass").value));
                document.getElementById("veg").value = 'Variety';
                document.getElementById("mass").value = 'Weight';
                local_store_object('pw' , my_pw);
                //display_running(my_pw.weights);
                toggle('total');
            }

            //display an HTML table of the JSON object obj on the page
            function display_running(obj){
                document.getElementById("running").innerHTML = '';
                document.getElementById("running").appendChild(jsonToTable(obj));
            }

            //toggle between displaying total weight, one share weight, or co-op weight in running table
            function toggle(which) {
                let my_pw = local_get_object('pw');
                have_merged = my_pw._varieties.length > my_pw._merged_varieties.length;
                switch(which) {
                    case "coop":
                        display_running(my_pw.coop_weights);
                        document.getElementById("toggle_coop").disabled = true;
                        document.getElementById("toggle_share").disabled = false;
                        document.getElementById("toggle_total").disabled = false;
                        if(have_merged) {
                            document.getElementById("toggle_unmerge").disabled = false;
                        } else {
                            document.getElementById("toggle_unmerge").disabled = true;
                        }
                        
                    break;
                    case "share":
                        display_running(my_pw.one_share);
                        document.getElementById("toggle_coop").disabled = false;
                        document.getElementById("toggle_share").disabled = true;
                        document.getElementById("toggle_total").disabled = false;
                        if(have_merged) {
                            document.getElementById("toggle_unmerge").disabled = false;
                        } else {
                            document.getElementById("toggle_unmerge").disabled = true;
                        }
                    break;
                    case "unmerge":
                        console.log('we got here');
                        display_running(my_pw.get_unmerged_weights());
                        document.getElementById("toggle_unmerge").disabled = true;
                        document.getElementById("toggle_total").disabled = false;
                        document.getElementById("toggle_coop").disabled = false;
                        document.getElementById("toggle_share").disabled = false;
                    break;
                    default:
                        console.log('default');
                        display_running(my_pw.weights);
                        document.getElementById("toggle_coop").disabled = false;
                        document.getElementById("toggle_share").disabled = false;
                        document.getElementById("toggle_total").disabled = true;
                        if(have_merged) {
                            document.getElementById("toggle_unmerge").disabled = false;
                        } else {
                            document.getElementById("toggle_unmerge").disabled = true;
                        }
                    break;
                }
            }

            //HTML-ify a json table
            function jsonToTable(jsonObject) {
                const table = document.createElement('table');
                
                const headerRow = document.createElement('tr');
                const headerItem = document.createElement('th');
                headerItem.textContent = 'Item';
                const headerWeight = document.createElement('th');
                headerWeight.textContent = 'Weight';
                headerRow.appendChild(headerItem);
                headerRow.appendChild(headerWeight);
                table.appendChild(headerRow);
                
                for (const [item, weight] of Object.entries(jsonObject)) {
                    const row = document.createElement('tr');
                    const cellItem = document.createElement('td');
                    cellItem.textContent = item;
                    const cellWeight = document.createElement('td');
                    cellWeight.textContent = weight;
                    row.appendChild(cellItem);
                    row.appendChild(cellWeight);
                    table.appendChild(row);
                }
                
                return table;
            }

            //add a row of named radio buttons to the running table for help with merging
            function addRadioButtonsToTable(table) {
                const tbl = document.getElementById('running').querySelector('table');
                for (let i = 1; i < tbl.rows.length; i++) {
                    const row = tbl.rows[i];
                    const cellRadio = document.createElement('td');
                    
                    const radioButton = document.createElement('input');
                    radioButton.type = 'checkbox';
                    radioButton.name = row.cells[0].textContent;
                    
                    cellRadio.appendChild(radioButton);
                    row.appendChild(cellRadio);
                }
                document.getElementById('do_merge').style.display='block';
            }

            //identify which radio buttons are selected and use the merge() function in ProduceWeight to merge them
            function merge() {
                inputs = document.getElementsByTagName("input");
                to_merge = [];
                for(let i = 0 ; i < inputs.length ; i++) {
                    if(inputs[i].type == 'checkbox') {
                        if(inputs[i].checked) {
                            to_merge.push(inputs[i].name);
                        }
                    }
                }
                let my_pw = local_get_object('pw');
                my_pw.merge(to_merge);
                local_store_object('pw' , my_pw);
                toggle('total');
                document.getElementById('do_merge').style.display='none';
                document.getElementById("toggle_unmerge").disabled=false;
            }

            //clear local storage and reload page
            function reset() {
                localStorage.clear();
                location.reload();
            }

            //downloads a JSON file of the current log for the user
            function exportJSON() {
                let my_pw = local_get_object('pw');
                my_pw.date = new Date();
                my_pw_json = JSON.stringify(my_pw);
                const link = document.createElement("a");
                const file = new Blob([my_pw_json], { type: 'text/plain' });
                link.href = URL.createObjectURL(file);
                link.download = "produceweight.json";
                link.click();
                URL.revokeObjectURL(link.href);
            }

            //helper event listeners to get rid of the forms and just show the running table upon command-P
            addEventListener("beforeprint", (event) => {
                document.getElementById("above_table").style.display = "none";
                document.getElementById("toggles").style.display = "none";
                document.getElementsByTagName("header")[0].style.display = "none";
                document.getElementsByTagName("footer")[0].style.display = "none";
            })

            addEventListener("afterprint", (event) => {
                document.getElementById("above_table").style.display = "block";
                document.getElementById("toggles").style.display = "block";
                document.getElementsByTagName("header")[0].style.display = "block";
                document.getElementsByTagName("footer")[0].style.display = "block";
            })
            function printDiv(divId) {
                document.getElementById("above_table").style.display = "none";
                document.getElementById("toggles").style.display = "none";
                var content = document.getElementById("to_print").innerHTML;
                var myWindow = window.open('', '', 'width=600,height=800');
                myWindow.document.write('<html><head><title>Print</title>');
                myWindow.document.write('<link rel="stylesheet" type="text/css" href="style.css">'); // Optional: Link to CSS
                myWindow.document.write('</head><body >');
                myWindow.document.write(content);
                myWindow.document.write('</body></html>');
                myWindow.document.close(); // Necessary for IE >= 10
                myWindow.print();
                document.getElementById("above_table").style.display = "block";
                document.getElementById("toggles").style.display = "block";
            }

            //write today's date on the page
            function set_date() {
                n =  new Date();
                y = n.getFullYear();
                m = n.getMonth() + 1;
                d = n.getDate();
                document.getElementById("date").innerHTML = m + "/" + d + "/" + y;
            }

            //handle dropdown menu clicks or taps
            function checkChange(event) {
                switch(event.target.value) {
                    case 'Print':
                        print()
                    break;
                    case 'Reset':
                        reset()
                    break;
                    case 'Merge':
                        addRadioButtonsToTable();
                    break;
                    case 'JSON':
                        exportJSON();
                    break;
                    default:
                        pass;
                    break;
                }
                event.target.selectedIndex = 0;
            }
        </script>
    </head>
    <body onload="set_date()">
    <main class="page-content" aria-label="Content" id = "to_print">
      <div class="wrapper">
        <table>
            <tr>
                <td><img src = './static/WG-logo-round.webp'></td>
                <td><h1>HARVEST LOG</h1><h2><i><div id = 'date'></div></i></h2></td>
            </tr>
        </table>
        <div id = "above_table">
            <form onsubmit="return false;" method = "post" name = "setup" id = "setup">
                <input type = "text" id = "n_shares" value = "# CSA shares" onclick = "document.getElementById('n_shares').value = ''" inputmode="numeric"><br>
                <input type = "text" id = "n_coop_shares" value = "# co-op shares" onclick = "document.getElementById('n_coop_shares').value = ''" inputmode="numeric"><br>
                <input type = "submit" value = "Start Weighing" onclick = "launch()" id = "launch_button">
            </form>
            <br>
            <div id = "additem" style = "display: none;">
                <form onsubmit = "return false;" method = "post" name = "additem">
                    <input type = "text" id = "veg" value = "Variety" onclick = "document.getElementById('veg').value = ''" style="width: 40;"><br>
                    <input type = "text" id = "mass" value = "Weight" onclick = "document.getElementById('mass').value = ''" style="width: 40;" inputmode="decimal">
                    <input type = "submit" value = "Add" onclick = "add();">
                </form>
            </div>
        </div>
        <br>
        <div id = "running"></div>
        <button onclick = "merge()" style = "display: none;" id = "do_merge">Merge!</button>
        <br>
        <div id = "toggles" style = "display : none">
            <button onclick = "toggle('share')" id = "toggle_share">Per-Share</button>
            <button onclick = "toggle('coop')" id = "toggle_coop" >Co-Op</button>
            <button onclick = "toggle('unmerge')" id = "toggle_unmerge" disabled>Unmerged</button>
            <button onclick = "toggle('total')" id = "toggle_total" disabled>Total</button>
            <select onchange = "checkChange(event)">
                <option value = "Options">Options</option>
                <option value = "Merge">Merge</option>
                <option value = "Print">Print</option>
                <option value = "JSON">Export</option>
                <option value = "Reset">Reset</option>
            </select>
        </div>
      </div>
    </main>
    </body>
</html>
